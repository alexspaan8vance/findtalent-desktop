name: release-desktop

# Builds the desktop installers and publishes them to a GitHub Release so the
# app's auto-updater (electron-updater) can deliver them.
#
# Trigger: push a tag like `v0.1.0`  →  git tag v0.1.0 && git push origin v0.1.0
# Windows (.exe) is built on windows-latest; macOS (.dmg + .zip) on macOS runners.
# Bob is on a Mac, so the macOS jobs matter most.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
          # Apple Silicon (M1/M2/M3/M4). macos-14+ runners are arm64.
          - os: macos-14
            flag: --mac
          # Intel Macs. macos-13 runners are x64.
          - os: macos-13
            flag: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync version to tag
        # electron-builder derives the GitHub release tag from package.json
        # `version`, NOT the git tag. Set them equal so a `v0.1.4` tag publishes
        # to the `v0.1.4` release. Shell differs per-OS; both set no git commit.
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install deps
        # npm install (not ci) so each platform resolves its own optional/native
        # deps and tolerates minor lockfile drift — the lockfile is generated on
        # Windows and can miss transitive versions the mac/linux tree resolves.
        run: npm install --no-audit --no-fund

      - name: Build + publish desktop artifact
        # next build + template DB run first (see desktop:build). electron-builder
        # builds the platform target from desktop/electron-builder.yml and uploads
        # to the Release matching this tag.
        run: npm run desktop:build -- ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # unsigned (Gatekeeper/SmartScreen note in INSTALL.md)
          # Build-time only. Optional features (Stripe/mail) are off in the shipped
          # app; these dummies just satisfy module init during `next build`. The
          # real per-user secrets are generated on Bob's machine at first run.
          DATABASE_URL: file:./prisma/build.db
          ENCRYPTION_KEY: rGVjb25zdHJ1Y3RlZC1idWlsZC1vbmx5LWR1bW15LWtleQ==
          AUTH_SECRET: build-only-dummy-auth-secret-not-used-at-runtime
          NEXTAUTH_URL: http://127.0.0.1:3000
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
