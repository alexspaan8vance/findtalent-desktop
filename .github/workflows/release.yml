name: release-desktop

# Builds the desktop installers and publishes them to a GitHub Release so the
# app's auto-updater (electron-updater) can deliver them.
#
# Trigger: push a tag like `v0.1.0`  →  git tag v0.1.0 && git push origin v0.1.0
# Windows (.exe) is built on windows-latest; macOS (.dmg + .zip) on macOS runners.
# Bob is on a Mac, so the macOS jobs matter most.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
          # Apple Silicon (M1/M2/M3/M4). macos-14+ runners are arm64.
          - os: macos-14
            flag: --mac
          # Intel Macs. macos-13 runners are x64.
          - os: macos-13
            flag: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # npm install (not ci) so each platform resolves its own optional/native
        # deps and tolerates minor lockfile drift — the lockfile is generated on
        # Windows and can miss transitive versions the mac/linux tree resolves.
        run: npm install --no-audit --no-fund

      - name: Build + publish desktop artifact
        # next build + template DB run first (see desktop:build). electron-builder
        # builds the platform target from desktop/electron-builder.yml and uploads
        # to the Release matching this tag.
        run: npm run desktop:build -- ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # unsigned (Gatekeeper/SmartScreen note in INSTALL.md)
