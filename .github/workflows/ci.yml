name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  # E2E hits the real 8vance API, so it needs the EIGHTVANCE_* secrets. Run it on
  # main pushes and on same-repo pull requests; gate on the secret being present
  # so fork PRs (which can't read secrets) skip cleanly instead of failing.
  e2e:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: file:./e2e.db
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3100
      EIGHTVANCE_CLIENT_ID: ${{ secrets.EIGHTVANCE_CLIENT_ID }}
      EIGHTVANCE_CLIENT_SECRET: ${{ secrets.EIGHTVANCE_CLIENT_SECRET }}
      EIGHTVANCE_COMPANY_ID: ${{ secrets.EIGHTVANCE_COMPANY_ID }}
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            e2e-report
            e2e-screenshots
          retention-days: 14
